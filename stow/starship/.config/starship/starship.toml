format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$aws\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = "theme"

# Edit these first when customizing:
# - palette colors in [palettes.theme]
# - [directory].style
# - [character] symbols/styles

[character]
success_symbol = "[➜](bold fg:ok)"
error_symbol = "[➜](bold fg:err)"
vicmd_symbol = "[➜](bold fg:warn)"

[directory]
style = "bold fg:primary"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = ".../"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
style = "fg:primary"
symbol = " "
format = "[on](fg:muted) [$symbol$branch ]($style)"

[git_status]
style = "fg:accent"
format = "([$all_status$ahead_behind]($style) )"

[fill]
symbol = " "

[python]
style = "fg:ok"
symbol = " "
format = "[$symbol$pyenv_prefix($version )($virtualenv )]($style)"
pyenv_version_name = true
pyenv_prefix = ""

[lua]
format = "[$symbol($version )]($style)"
symbol = " "
style = "fg:warn"

[nodejs]
style = "fg:ok"
symbol = " "

[golang]
style = "fg:primary"
symbol = " "

[haskell]
style = "fg:accent_alt"
symbol = " "

[rust]
style = "fg:accent"
symbol = " "

[ruby]
style = "fg:primary"
symbol = " "

[package]
symbol = "󰏗 "

[aws]
symbol = " "
style = "fg:ok"
format = "[$symbol($profile )([$duration] )]($style)"

[docker_context]
symbol = " "
style = "fg:warn"
format = "[$symbol]($style) $path"
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[jobs]
symbol = " "
style = "fg:muted"
number_threshold = 1
format = "[$symbol]($style)"

[cmd_duration]
min_time = 500
style = "fg:muted"
format = "[$duration]($style)"

[palettes.theme]
primary = "#4c78a8"
accent = "#59a14f"
accent_alt = "#b279a2"
ok = "#59a14f"
warn = "#f2a541"
err = "#e45756"
muted = "#7a7a7a"
